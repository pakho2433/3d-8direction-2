name: Publish free-view and wrong-route replay update

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-free-view-wrong-replay.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write updated game
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64, gzip
          payload = """"""
          Path("index.html").write_bytes(gzip.decompress(base64.b64decode(payload)))
          print("Updated index.html written")
          PY

      - name: Commit game update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes required"
          else
            git commit -m "Add free camera control and wrong-route replay [skip ci]"
            git push
          fi
